name: Smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate test SVG with local action
        uses: ./
        with:
          options: user=${{ github.repository_owner }}&theme=radical&disable_animations=true&starting_year=2026
          path: tmp/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert SVG exists
        run: |
          test -s tmp/streak.svg
          grep -q "Current Streak" tmp/streak.svg
